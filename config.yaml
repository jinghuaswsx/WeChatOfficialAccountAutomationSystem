app:
  host: "127.0.0.1"
  port: 8000
  daily_check_time: "20:00"

collector:
  claude_data_path: "~/.claude/"
  min_complexity: "superpowers"

pipeline:
  stages:
    - name: "content_extraction"
      plugin: "claude"
    - name: "article_writing"
      plugin: "deepseek"
    - name: "deai_processing"
      plugin: "qwen"
    - name: "review"
      plugin: "claude"

scorer:
  pass_threshold: 80
  ai_trace_hard_limit: 70
  weights:
    content_quality: 0.3
    ai_trace: 0.3
    style_match: 0.2
    readability: 0.1
    formatting: 0.1

publishers:
  wechat:
    enabled: true
    app_id: ""
    app_secret: ""
  xiaohongshu:
    enabled: false
  twitter:
    enabled: false

image_generator:
  plugin: "gemini"
  api_key: ""

notifications:
  enabled: true
  engine: "openclaw_notify"
  events:
    - "points_ready"
    - "draft_ready"
    - "published"
    - "failed"
